name = "moontv"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"

# 在 cloudflare dashboard 中创建 D1 数据库:
#   npx wrangler d1 create moontv-db
# 然后将 database_id 替换为实际的 ID
# 初始化表结构:
#   npx wrangler d1 execute moontv-db --file=D1初始化.md
[[d1_databases]]
binding = "DB"
database_name = "moontv-db"
database_id = ""

# 环境变量
[vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_ENABLE_REGISTER = "true"
NEXT_PUBLIC_DISABLE_YELLOW_FILTER = "false"
